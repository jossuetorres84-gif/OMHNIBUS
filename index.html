<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÓMHNIBUS Total Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans antialiased">

  <div class="flex flex-col h-screen max-w-2xl mx-auto p-4 justify-between">
    <!-- Encabezado Unificado -->
    <header class="flex justify-between items-center py-2 border-b border-slate-800">
      <h1 class="text-xl font-bold tracking-widest text-teal-400">ÓMHNIBUS</h1>
      <button onclick="toggleKeyManager()" class="text-xs bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-teal-300 font-semibold">🔑 Gestionar Conectores Cloud</button>
    </header>

    <!-- Administrador de Llaves Cloud Permanentes -->
    <div id="key-manager" class="hidden flex-1 flex flex-col justify-center px-4 space-y-3">
      <h3 class="text-sm font-semibold text-center text-teal-400">Panel de Conectores Cloud (Persistente)</h3>
      <div class="space-y-2 text-xs">
        <div>
          <label class="text-slate-400">Google Gemini Key:</label>
          <input type="password" id="key-gemini" placeholder="AIzaSy..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none focus:border-teal-500">
        </div>
        <div>
          <label class="text-slate-400">OpenAI GPT Key:</label>
          <input type="password" id="key-openai" placeholder="sk-proj-..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none focus:border-teal-500">
        </div>
        <div>
          <label class="text-slate-400">OpenRouter (IAs Gratis / Claude / DeepSeek):</label>
          <input type="password" id="key-openrouter" placeholder="sk-or-v1-..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none focus:border-teal-500">
        </div>
        <div>
          <label class="text-slate-400">Groq / Open Source Key (Llama/Hermes):</label>
          <input type="password" id="key-groq" placeholder="gsk_..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none focus:border-teal-500">
        </div>
      </div>
      <button onclick="saveAllKeys()" class="w-full bg-teal-600 hover:bg-teal-500 text-white py-2 rounded-lg text-xs font-semibold">Fijar Llaves en el Dispositivo</button>
    </div>

    <!-- Lienzo de Chat Concurrente -->
    <main id="chat-screen" class="flex-1 overflow-y-auto my-4 space-y-4 pr-1 text-sm">
      <div id="empty-notice" class="text-center text-slate-600 mt-20 text-xs">
        Ecosistema síncrono activo. Configura tus llaves y lanza una instrucción para ejecutar todas las IAs en paralelo.
      </div>
      <div id="messages-container" class="space-y-4"></div>
    </main>

    <!-- Panel de Control Inferior -->
    <footer id="controls-footer" class="space-y-2">
      <div class="flex items-center justify-between bg-slate-900/50 p-2 rounded-lg border border-slate-800/60 text-xs">
        <span class="text-slate-400">Activar ÓmhnibusCouncil (Fusión de Criterio)</span>
        <button id="council-btn" onclick="toggleCouncil()" class="w-9 h-5 flex items-center bg-slate-700 rounded-full p-1 duration-200">
          <span id="council-dot" class="bg-white w-3 h-3 rounded-full shadow-sm transition-transform"></span>
        </button>
      </div>
      <div class="flex gap-2">
        <input type="text" id="user-input" placeholder="Enviar instrucción a todos los motores..." class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-teal-500" onkeypress="if(event.key === 'Enter') sendPromptAll()">
        <button onclick="sendPromptAll()" class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">Lanzar</button>
      </div>
    </footer>
  </div>

  <script>
    let useCouncil = false;
    let showManager = false;
    
    const keys = {
      gemini: localStorage.getItem('_om_key_gemini') || '',
      openai: localStorage.getItem('_om_key_openai') || '',
      openrouter: localStorage.getItem('_om_key_openrouter') || '',
      groq: localStorage.getItem('_om_key_groq') || ''
    };

    // Cargar valores iniciales si existen
    document.getElementById('key-gemini').value = keys.gemini;
    document.getElementById('key-openai').value = keys.openai;
    document.getElementById('key-openrouter').value = keys.openrouter;
    document.getElementById('key-groq').value = keys.groq;

    // Forzar apertura inicial si el almacenamiento local está vacío
    if (!keys.gemini && !keys.openai && !keys.openrouter && !keys.groq) {
      toggleKeyManager();
    }

    function toggleKeyManager() {
      showManager = !showManager;
      if (showManager) {
        document.getElementById('chat-screen').classList.add('hidden');
        document.getElementById('key-manager').classList.remove('hidden');
      } else {
        document.getElementById('key-manager').classList.add('hidden');
        document.getElementById('chat-screen').classList.remove('hidden');
      }
    }

    function saveAllKeys() {
      keys.gemini = document.getElementById('key-gemini').value.trim();
      keys.openai = document.getElementById('key-openai').value.trim();
      keys.openrouter = document.getElementById('key-openrouter').value.trim();
      keys.groq = document.getElementById('key-groq').value.trim();

      localStorage.setItem('_om_key_gemini', keys.gemini);
      localStorage.setItem('_om_key_openai', keys.openai);
      localStorage.setItem('_om_key_openrouter', keys.openrouter);
      localStorage.setItem('_om_key_groq', keys.groq);

      showManager = false;
      document.getElementById('key-manager').classList.add('hidden');
      document.getElementById('chat-screen').classList.remove('hidden');
    }

    // El resto de funciones auxiliares permanecen idénticas para asegurar consistencia táctil
    function toggleCouncil() {
      useCouncil = !useCouncil;
      const btn = document.getElementById('council-btn');
      const dot = document.getElementById('council-dot');
      if (useCouncil) {
        btn.classList.replace('bg-slate-700', 'bg-teal-500');
        dot.classList.add('translate-x-4');
      } else {
        btn.classList.replace('bg-teal-500', 'bg-slate-700');
        dot.classList.remove('translate-x-4');
      }
    }

    function appendUserMessage(text) {
      const container = document.getElementById('messages-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'p-3 rounded-lg max-w-[85%] bg-teal-600 text-white ml-auto whitespace-pre-wrap text-sm';
      msgDiv.innerText = text;
      container.appendChild(msgDiv);
      document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;
    }

    function createEngineBlock(engineName) {
      const container = document.getElementById('messages-container');
      const block = document.createElement('div');
      block.className = 'p-3 rounded-lg bg-slate-900 border border-slate-800 space-y-1 text-sm';
      
      const header = document.createElement('div');
      header.className = 'text-xs font-bold tracking-wider uppercase text-slate-500 flex justify-between items-center';
      header.innerHTML = `<span>🤖 ${engineName}</span> <span class="animate-pulse text-teal-400 text-[10px]">PROCESANDO...</span>`;
      
      const content = document.createElement('div');
      content.className = 'text-slate-200 whitespace-pre-wrap pt-1';
      content.innerText = 'Esperando flujo de respuesta...';
      
      block.appendChild(header);
      block.appendChild(content);
      container.appendChild(block);
      
      document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;
      return { block, content, header };
    }

    async function sendPromptAll() {
      const inputEl = document.getElementById('user-input');
      const prompt = inputEl.value.trim();
      if (!prompt) return;

      if (!keys.gemini && !keys.openai && !keys.openrouter && !keys.groq) {
        alert('Por favor, ingresa y guarda al menos una clave API para iniciar.');
        toggleKeyManager();
        return;
      }

      inputEl.value = '';
      document.getElementById('empty-notice').classList.add('hidden');
      appendUserMessage(prompt);

      let finalPrompt = prompt;
      if (useCouncil) {
        finalPrompt = `Actúas como un Consejo de Expertos en IA (ÓmhnibusCouncil). 
Debatid internamente la siguiente solicitud desde los roles de Skeptical Architect, Security Auditor y Performance Expert.
Generad una única respuesta técnica unificada de nivel Senior: ${prompt}`;
      }

      if (keys.gemini) fetchGemini(finalPrompt);
      if (keys.openai) fetchOpenAI(finalPrompt);
      if (keys.openrouter) fetchOpenRouter(finalPrompt);
      if (keys.groq) fetchGroq(finalPrompt);
    }

    async function fetchGemini(prompt) {
      const ui = createEngineBlock('Google Gemini Cloud');
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keys.gemini}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        ui.content.innerText = data.candidates[0].content.parts[0].text;
        ui.header.children[1].className = 'text-green-400 text-[10px] font-mono';
        ui.header.children[1].innerText = '🟢 ONLINE';
      } catch (err) {
        ui.content.innerText = 'Error en Gemini Cloud. Revisa el estado de la clave.';
        ui.header.children[1].className = 'text-red-500 text-[10px] font-mono';
        ui.header.children[1].innerText = '🔴 ERROR';
      }
    }

    async function fetchOpenAI(prompt) {
      const ui = createEngineBlock('OpenAI ChatGPT');
      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.openai}` },
          body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }] })
        });
        const data = await res.json();
        ui.content.innerText = data.choices[0].message.content;
        ui.header.children[1].className = 'text-green-400 text-[10px] font-mono';
        ui.header.children[1].innerText = '🟢 ONLINE';
      } catch (err) {
        ui.content.innerText = 'Error en OpenAI. Requiere saldo activo.';
        ui.header.children[1].className = 'text-red-500 text-[10px] font-mono';
        ui.header.children[1].innerText = '🔴 ERROR';
      }
    }

    async function fetchOpenRouter(prompt) {
      const ui = createEngineBlock('OpenRouter / Claude-Free');
      try {
        // Apunta directamente a OpenRouter usando un modelo Pro libre por defecto (auto-mapeado sin costo)
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json', 
            'Authorization': `Bearer ${keys.openrouter}`
          },
          body: JSON.stringify({ 
            model: 'meta-llama/llama-3-8b-instruct:free', 
            messages: [{ role: 'user', content: prompt }] 
          })
        });
        const data = await res.json();
        ui.content.innerText = data.choices[0].message.content;
        ui.header.children[1].className = 'text-green-400 text-[10px] font-mono';
        ui.header.children[1].innerText = '🟢 ONLINE';
      } catch (err) {
        ui.content.innerText = 'Error en OpenRouter. Comprueba que tu clave (sk-or-v1-...) esté copiada completa.';
        ui.header.children[1].className = 'text-red-500 text-[10px] font-mono';
        ui.header.children[1].innerText = '🔴 ERROR';
      }
    }

    async function fetchGroq(prompt) {
      const ui = createEngineBlock('Groq / Open Source');
      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.groq}` },
          body: JSON.stringify({ model: 'llama3-8b-8192', messages: [{ role: 'user', content: prompt }] })
        });
        const data = await res.json();
        ui.content.innerText = data.choices[0].message.content;
        ui.header.children[1].className = 'text-green-400 text-[10px] font-mono';
        ui.header.children[1].innerText = '🟢 ONLINE';
      } catch (err) {
        ui.content.innerText = 'Error en Groq Cloud.';
        ui.header.children[1].className = 'text-red-500 text-[10px] font-mono';
        ui.header.children[1].innerText = '🔴 ERROR';
      }
    }
    // --- NUEVO ENRUTADOR INTELIGENTE Y DETALLE DE MODELOS ---
async function sendPromptAll() {
  const inputEl = document.getElementById('user-input');
  const prompt = inputEl.value.trim();
  if (!prompt) return;

  if (!keys.gemini && !keys.openai && !keys.openrouter && !keys.groq) {
    alert('Por favor, ingresa y guarda al menos una clave API para iniciar.');
    toggleKeyManager();
    return;
  }

  inputEl.value = '';
  document.getElementById('empty-notice').classList.add('hidden');
  appendUserMessage(prompt);

  let finalPrompt = prompt;
  if (useCouncil) {
    finalPrompt = `Actúas como un Consejo de Expertos en IA (ÓmhnibusCouncil). Debatid internamente la siguiente solicitud desde los roles de Skeptical Architect, Security Auditor y Performance Expert. Generad una única respuesta técnica unificada de nivel Senior: ${prompt}`;
  }

  const isCoding = /código|programar|script|función|html|css|js|java|python|json/i.test(prompt);
  const isComplex = prompt.length > 120 || /analiza|resume|debate|explica|comparar|audita/i.test(prompt);

  if (isCoding && keys.openai) { fetchOpenAI(finalPrompt); } 
  else if (isComplex && keys.gemini) { fetchGemini(finalPrompt); } 
  else if (keys.openrouter) { fetchOpenRouter(finalPrompt); }

  if (keys.groq) { fetchGroq(finalPrompt); }
}

async function fetchOpenRouter(prompt) {
  const ui = createEngineBlock('OpenRouter / Buscando Modelo...');
  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.openrouter}` },
      body: JSON.stringify({ model: 'meta-llama/llama-3-8b-instruct:free', messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    ui.header.innerHTML = `<span>🤖 MODELO: Llama 3 8B Instruct (Open Source vía OpenRouter)</span> <span class="text-green-400 text-[10px] font-mono">🟢 ONLINE</span>`;
    ui.content.innerText = data.choices[0].message.content;
  } catch (err) {
    ui.content.innerText = 'Error en OpenRouter.';
  }
}

async function fetchGroq(prompt) {
  const ui = createEngineBlock('Groq / Buscando Nodo...');
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.groq}` },
      body: JSON.stringify({ model: 'llama3-8b-8192', messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    ui.header.innerHTML = `<span>🤖 MODELO: Llama 3 8B Hardware-Accelerated (Open Source vía Groq)</span> <span class="text-green-400 text-[10px] font-mono">🟢 ONLINE</span>`;
    ui.content.innerText = data.choices[0].message.content;
  } catch (err) {
    ui.content.innerText = 'Error en Groq.';
  }
}

  </script>
</body>
</html>
