<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fdfbf7; touch-action: none; }
        
        /* El lienzo es el elemento raíz de interacción */
        #canvas-container {
            width: 100vw; 
            height: 100vh;
            cursor: grab;
            transform-origin: 0 0;
            background-image: radial-gradient(#dcdcdc 1px, transparent 1px);
            background-size: 40px 40px;
            /* Eliminamos absolute para que ocupe su espacio natural */
        }

        body.dark-mode { background-color: #1a1a1a; }
        body.dark-mode #canvas-container { background-image: radial-gradient(#333 1px, transparent 1px); }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999; /* Asegura que esté por encima de todo */
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<button id="theme-toggle">Modo Oscuro</button>
<div id="canvas-container"></div>

<script>
    const container = document.getElementById('canvas-container');
    const themeBtn = document.getElementById('theme-toggle');
    let scale = 1;
    let posX = 0;
    let posY = 0;
    let isDragging = false;
    let startX, startY;

    // Cambio de modo
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        themeBtn.innerText = document.body.classList.contains('dark-mode') ? 'Modo Claro' : 'Modo Oscuro';
    });

    // Zoom
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta;
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }, { passive: false });

    // Drag (Desplazamiento)
    container.addEventListener('pointerdown', (e) => {
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
        container.style.cursor = 'grabbing';
        container.setPointerCapture(e.pointerId);
    });

    container.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    });

    container.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        container.style.cursor = 'grab';
        container.releasePointerCapture(e.pointerId);
    });
</script>
</body>
</html>
