<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÓMHNIBUS Multi-Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans antialiased">

  <div class="flex flex-col h-screen max-w-2xl mx-auto p-4 justify-between">
    <!-- Encabezado con Selector Dinámico de IA -->
    <header class="flex justify-between items-center py-2 border-b border-slate-800 gap-2">
      <h1 class="text-xl font-bold tracking-widest text-teal-400">ÓMHNIBUS</h1>
      
      <div class="flex items-center gap-2">
        <select id="engine-selector" onchange="handleEngineChange()" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-xs text-teal-300 focus:outline-none">
          <option value="gemini">Google Gemini (Gratis)</option>
          <option value="openai">OpenAI ChatGPT</option>
          <option value="anthropic">Anthropic Claude</option>
          <option value="groq">Groq / Open Source (Llama/Hermes)</option>
        </select>
        <button onclick="showKeyManager()" class="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-700">🔑 Keys</button>
      </div>
    </header>

    <!-- Administrador de Llaves Cloud (Modal integrado) -->
    <div id="key-manager" class="hidden flex-1 flex flex-col justify-center px-4 space-y-3">
      <h3 class="text-sm font-semibold text-center text-teal-400">Panel de Conectores Cloud</h3>
      <div class="space-y-2 text-xs">
        <div>
          <label class="text-slate-400">Google Gemini Key:</label>
          <input type="password" id="key-gemini" placeholder="AIzaSy..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white">
        </div>
        <div>
          <label class="text-slate-400">OpenAI GPT Key:</label>
          <input type="password" id="key-openai" placeholder="sk-proj-..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white">
        </div>
        <div>
          <label class="text-slate-400">Anthropic Claude Key:</label>
          <input type="password" id="key-anthropic" placeholder="sk-ant-..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white">
        </div>
        <div>
          <label class="text-slate-400">Groq / Open Source Key:</label>
          <input type="password" id="key-groq" placeholder="gsk_..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white">
        </div>
      </div>
      <button onclick="saveAllKeys()" class="w-full bg-teal-600 hover:bg-teal-500 text-white py-2 rounded-lg text-xs font-semibold">Guardar y Vincular Nube</button>
    </div>

    <!-- Lienzo de Chat Unificado -->
    <main id="chat-screen" class="flex-1 overflow-y-auto my-4 space-y-3 pr-1 text-sm">
      <div id="empty-notice" class="text-center text-slate-600 mt-20">
        Ecosistema multi-ia listo. Elige un proveedor e inicia el flujo.
      </div>
      <div id="messages-container" class="space-y-3"></div>
      <div id="loading-indicator" class="hidden text-xs text-slate-500 animate-pulse">
        ÓMHNIBUS procesando en el nodo seleccionado...
      </div>
    </main>

    <!-- Panel de Control Inferior -->
    <footer id="controls-footer" class="space-y-2">
      <div class="flex items-center justify-between bg-slate-900/50 p-2 rounded-lg border border-slate-800/60 text-xs">
        <span class="text-slate-400">Activar ÓmhnibusCouncil (Multi-Agente)</span>
        <button id="council-btn" onclick="toggleCouncil()" class="w-9 h-5 flex items-center bg-slate-700 rounded-full p-1 duration-200">
          <span id="council-dot" class="bg-white w-3 h-3 rounded-full shadow-sm transition-transform"></span>
        </button>
      </div>
      <div class="flex gap-2">
        <input type="text" id="user-input" placeholder="Escribe una instrucción..." class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-teal-500" onkeypress="if(event.key === 'Enter') sendPrompt()">
        <button onclick="sendPrompt()" class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">Enviar</button>
      </div>
    </footer>
  </div>

  <!-- Orquestador Inteligente Multi-Adaptador -->
  <script>
    let useCouncil = false;
    const keys = {
      gemini: localStorage.getItem('_om_key_gemini') || '',
      openai: localStorage.getItem('_om_key_openai') || '',
      anthropic: localStorage.getItem('_om_key_anthropic') || '',
      groq: localStorage.getItem('_om_key_groq') || ''
    };

    // Inicializar campos del gestor de llaves
    document.getElementById('key-gemini').value = keys.gemini;
    document.getElementById('key-openai').value = keys.openai;
    document.getElementById('key-anthropic').value = keys.anthropic;
    document.getElementById('key-groq').value = keys.groq;

    // Si falta la llave del motor por defecto, abrir configuración
    if (!keys.gemini) {
      showKeyManager();
    }

    function showKeyManager() {
      document.getElementById('chat-screen').classList.add('hidden');
      document.getElementById('key-manager').classList.remove('hidden');
    }

    function saveAllKeys() {
      keys.gemini = document.getElementById('key-gemini').value.trim();
      keys.openai = document.getElementById('key-openai').value.trim();
      keys.anthropic = document.getElementById('key-anthropic').value.trim();
      keys.groq = document.getElementById('key-groq').value.trim();

      localStorage.setItem('_om_key_gemini', keys.gemini);
      localStorage.setItem('_om_key_openai', keys.openai);
      localStorage.setItem('_om_key_anthropic', keys.anthropic);
      localStorage.setItem('_om_key_groq', keys.groq);

      document.getElementById('key-manager').classList.add('hidden');
      document.getElementById('chat-screen').classList.remove('hidden');
    }

    function handleEngineChange() {
      const selected = document.getElementById('engine-selector').value;
      if (!keys[selected]) {
        alert(`Recuerda configurar la clave para el motor: ${selected.toUpperCase()}`);
        showKeyManager();
      }
    }

    function toggleCouncil() {
      useCouncil = !useCouncil;
      const btn = document.getElementById('council-btn');
      const dot = document.getElementById('council-dot');
      if (useCouncil) {
        btn.classList.replace('bg-slate-700', 'bg-teal-500');
        dot.classList.add('translate-x-4');
      } else {
        btn.classList.replace('bg-teal-500', 'bg-slate-700');
        dot.classList.remove('translate-x-4');
      }
    }

    async function sendPrompt() {
      const inputEl = document.getElementById('user-input');
      const prompt = inputEl.value.trim();
      if (!prompt) return;

      const engine = document.getElementById('engine-selector').value;
      if (!keys[engine]) return alert('Por favor, configura la clave de este motor primero.');

      inputEl.value = '';
      document.getElementById('empty-notice').classList.add('hidden');
      appendMessage('user', prompt);

      const loader = document.getElementById('loading-indicator');
      loader.classList.remove('hidden');

      let finalPrompt = prompt;
      if (useCouncil) {
        finalPrompt = `Actúas como un Consejo de Expertos en IA (ÓmhnibusCouncil). 
Debatid internamente la siguiente solicitud desde los roles de Skeptical Architect, Security Auditor y Performance Expert.
Generad una única respuesta técnica unificada de nivel Senior: ${prompt}`;
      }

      try {
        let reply = '';
        
        // Enrutamiento Dinámico según el motor seleccionado
        if (engine === 'gemini') {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keys.gemini}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
          });
          const data = await res.json();
          reply = data.candidates[0].content.parts[0].text;

        } else if (engine === 'openai') {
          const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.openai}` },
            body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: finalPrompt }] })
          });
          const data = await res.json();
          reply = data.choices[0].message.content;

        } else if (engine === 'anthropic') {
          // Nota: Las llamadas directas de cliente a Anthropic suelen requerir proxy por CORS; 
          // se mapea el canal estándar estructurado.
          reply = "[Canal Claude inicializado] Configura un proxy intermedio para saltar las restricciones CORS nativas de Anthropic en navegadores.";

        } else if (engine === 'groq') {
          // Groq procesa modelos Open Source líderes (Llama 3, Hermes, Mixtral) a velocidad ultra-rápida y gratis
          const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.groq}` },
            body: JSON.stringify({ model: 'llama3-8b-8192', messages: [{ role: 'user', content: finalPrompt }] })
          });
          const data = await res.json();
          reply = data.choices[0].message.content;
        }

        appendMessage('system', reply);
      } catch (err) {
        appendMessage('system', 'Error en el nodo de red. Revisa la validez de tu llave.');
      } {
        loader.classList.add('hidden');
      }
    }

    function appendMessage(sender, text) {
      const container = document.getElementById('messages-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = sender === 'user' 
        ? 'p-3 rounded-lg max-w-[85%] bg-teal-600 text-white ml-auto whitespace-pre-wrap'
        : 'p-3 rounded-lg max-w-[85%] bg-slate-900 border border-slate-800 text-slate-200 whitespace-pre-wrap';
      msgDiv.innerText = text;
      container.appendChild(msgDiv);
      document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;
    }
  </script>
</body>
</html>
