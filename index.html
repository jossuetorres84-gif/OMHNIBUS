  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÓMHNIBUS - Canvas Geométrico</title>
    <style>
        :root {
            --bg-color: #090d16;
            --grid-color: rgba(58, 134, 255, 0.08);
            --grid-size: 30px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            overflow: hidden;
            touch-action: none;
        }

        #infinite-canvas {
            position: absolute;
            width: 10000px;
            height: 10000px;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        line {
            stroke: rgba(58, 134, 255, 0.6);
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        /* Estructura Base Dinámica del Nodo */
        .node {
            position: absolute;
            background: rgba(28, 37, 65, 0.75);
            border: 2px solid rgba(90, 158, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
            font-size: 12px;
            color: #e2e8f0;
            font-weight: 500;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease, border-color 0.2s ease;
        }

        /* Diccionario Geométrico Avanzado */
        .shape-circle { border-radius: 50%; clip-path: none; }
        .shape-square { border-radius: 14px; clip-path: none; }
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); padding-top: 20px; }
        .shape-pentagon { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); padding-top: 10px; }
        .shape-hexagon { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        .shape-rhombus { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

        .node-active { transform: scale(1.05); border-color: #3a86ff; box-shadow: 0 0 20px rgba(58, 134, 255, 0.4); }
        .node-connecting { border-color: #ffbe0b; box-shadow: 0 0 20px rgba(255, 190, 11, 0.5); }

        /* Menús de Interfaz Flotante */
        .context-menu {
            position: absolute;
            background: rgba(9, 13, 22, 0.95);
            border: 1px solid rgba(58, 134, 255, 0.3);
            border-radius: 14px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .context-menu button {
            background: transparent;
            color: #cbd5e1;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            min-width: 150px;
            touch-action: none;
        }

        .context-menu button:active { background: rgba(58, 134, 255, 0.2); color: #3a86ff; }
        .context-menu .btn-del { color: #ff006e; }
        .context-menu .btn-del:active { background: rgba(255, 0, 110, 0.2); }

        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 11px;
            color: #64748b;
            pointer-events: none;
            background: rgba(9, 13, 22, 0.6);
            padding: 8px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="hud">
        🌌 Paneo: 1 Dedo | 📱 Zoom Fijo: 2 Dedos | 🔘 Doble Toque: Crear | 🎯 Presión Larga: Opciones
    </div>

    <div id="viewport">
        <div id="infinite-canvas">
            <svg id="svg-connections"></svg>
        </div>
    </div>

    <!-- Menú Contextual Principal -->
    <div id="menu-contextual" class="context-menu">
        <button id="menu-text">✏️ Editar Texto</button>
        <button id="menu-connect">🔗 Conectar A...</button>
        <button id="menu-size">📐 Cambiar Tamaño</button>
        <button id="menu-shape-trigger">💎 Cambiar Forma ➔</button>
        <button id="menu-del" class="btn-del">🗑️ Eliminar Nodo</button>
    </div>

    <!-- Submenú Selectivo de Formas Geométricas -->
    <div id="menu-formas" class="context-menu">
        <button onclick="setShape('circle')">🔘 Círculo</button>
        <button onclick="setShape('square')">⬛ Cuadrado</button>
        <button onclick="setShape('triangle')">🔺 Triángulo</button>
        <button onclick="setShape('pentagon')">⬠ Pentágono</button>
        <button onclick="setShape('hexagon')">⬢ Hexágono</button>
        <button onclick="setShape('rhombus')">🔷 Rombo</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('infinite-canvas');
        const svg = document.getElementById('svg-connections');
        const menu = document.getElementById('menu-contextual');
        const menuFormas = document.getElementById('menu-formas');

        let scale = 1;
        let panX = window.innerWidth / 2 - 5000;
        let panY = window.innerHeight / 2 - 5000;

        let isPanningCanvas = false;
        let startPanX = 0, startPanY = 0;
        let initPinchDist = 0;
        let initScale = 1;
        let lastTap = 0;
        
        let zoomActive = false;
        let blockTime = 0;

        let nodes = [];
        let connections = [];
        let nodeCount = 0;
        let nodeTargetSelected = null;
        let connectionSource = null;

        function applyTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }
        applyTransform();

        // --- MANEJO DE ZOOM Y PANEO DE REJILLA ---
        viewport.addEventListener('touchstart', (e) => {
            ocultarMenu();
            if (e.target !== viewport && e.target !== canvas && e.target.id !== 'svg-connections') return;

            if (e.touches.length === 1) {
                if (Date.now() - blockTime < 300) return;
                isPanningCanvas = true;
                startPanX = e.touches[0].clientX - panX;
                startPanY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isPanningCanvas = false;
                zoomActive = true;
                initPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initScale = scale;
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (isPanningCanvas && e.touches.length === 1) {
                panX = e.touches[0].clientX - startPanX;
                panY = e.touches[0].clientY - startPanY;
                applyTransform();
            } else if (zoomActive && e.touches.length === 2) {
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const canvasX = (midX - panX) / scale;
                const canvasY = (midY - panY) / scale;
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                scale = Math.min(Math.max(initScale * (dist / initPinchDist), 0.25), 2.5);
                panX = midX - canvasX * scale;
                panY = midY - canvasY * scale;
                applyTransform();
            }
        });

        viewport.addEventListener('touchend', (e) => {
            isPanningCanvas = false;
            if (e.touches.length === 0 && zoomActive) {
                zoomActive = false;
                blockTime = Date.now();
            }

            if (e.target === viewport || e.target === canvas || e.target.id === 'svg-connections') {
                let now = Date.now();
                if (now - lastTap < 300 && !zoomActive && (now - blockTime > 400)) {
                    let touch = e.changedTouches[0];
                    const xOnCanvas = (touch.clientX - panX) / scale;
                    const yOnCanvas = (touch.clientY - panY) / scale;
                    createNode(xOnCanvas, yOnCanvas);
                }
                lastTap = now;
            }
        });

        // --- GESTIÓN DE NODOS DINÁMICOS ---
        function createNode(x, y) {
            nodeCount++;
            const id = 'node_' + Date.now();
            
            const n = document.createElement('div');
            n.id = id;
            n.className = 'node shape-circle';
            n.innerText = 'Nodo ' + nodeCount;
            
            // Atributos de dimensión inicial por defecto
            const defaultSize = 110;
            n.style.width = defaultSize + 'px';
            n.style.height = defaultSize + 'px';
            n.style.left = (x - defaultSize / 2) + 'px';
            n.style.top = (y - defaultSize / 2) + 'px';

            const nodeObj = { id, element: n, x: x, y: y, size: defaultSize, shape: 'circle' };
            nodes.push(nodeObj);

            let isDraggingNode = false;
            let pressTimer = null;

            n.addEventListener('touchstart', (ev) => {
                ev.stopPropagation();
                ocultarMenu();
                if (connectionSource) return;

                n.classList.add('node-active');
                pressTimer = setTimeout(() => {
                    isDraggingNode = false;
                    n.classList.remove('node-active');
                    abrirMenu(nodeObj, ev.touches[0].clientX, ev.touches[0].clientY);
                }, 550);

                isDraggingNode = true;
            });

            n.addEventListener('touchmove', (ev) => {
                if (!isDraggingNode) return;
                clearTimeout(pressTimer);

                let touch = ev.touches[0];
                const currentX = (touch.clientX - panX) / scale;
                const currentY = (touch.clientY - panY) / scale;

                nodeObj.x = currentX;
                nodeObj.y = currentY;
                n.style.left = (currentX - nodeObj.size / 2) + 'px';
                n.style.top = (currentY - nodeObj.size / 2) + 'px';

                actualizarLineas();
            });

            n.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
                isDraggingNode = false;
                n.classList.remove('node-active');

                if (connectionSource && connectionSource !== nodeObj) {
                    crearEnlace(connectionSource, nodeObj);
                    finalizarConexion();
                }
            });

            canvas.appendChild(n);
            actualizarLineas();
        }

        // --- SISTEMA DE CONTROL DE MENÚS ---
        function abrirMenu(nodeObj, clientX, clientY) {
            nodeTargetSelected = nodeObj;
            menu.style.display = 'flex';
            menu.style.left = Math.min(clientX, window.innerWidth - 170) + 'px';
            menu.style.top = Math.min(clientY, window.innerHeight - 220) + 'px';
        }

        function ocultarMenu() { 
            menu.style.display = 'none'; 
            menuFormas.style.display = 'none';
        }

        // Submenú: Desplegar selección geométrica
        document.getElementById('menu-shape-trigger').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            menuFormas.style.display = 'flex';
            menuFormas.style.left = (parseFloat(menu.style.left) + 40) + 'px';
            menuFormas.style.top = (parseFloat(menu.style.top) + 40) + 'px';
        });

        function setShape(newShape) {
            if (!nodeTargetSelected) return;
            const el = nodeTargetSelected.element;
            
            // Remover formas previas
            el.classList.remove('shape-circle', 'shape-square', 'shape-triangle', 'shape-pentagon', 'shape-hexagon', 'shape-rhombus');
            // Inyectar nueva geometría asignada
            el.classList.add('shape-' + newShape);
            nodeTargetSelected.shape = newShape;
            ocultarMenu();
        }

        // Configuración de Dimensión (Modificable manualmente)
        document.getElementById('menu-size').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            ocultarMenu();
            setTimeout(() => {
                let nuevoTamano = prompt("Asigna el tamaño en píxeles (Ej. 80 a 200):", nodeTargetSelected.size);
                let parseSize = parseInt(nuevoTamano);
                if (!isNaN(parseSize) && parseSize >= 40 && parseSize <= 400) {
                    nodeTargetSelected.size = parseSize;
                    nodeTargetSelected.element.style.width = parseSize + 'px';
                    nodeTargetSelected.element.style.height = parseSize + 'px';
                    
                    // Reposicionar caja según nuevas dimensiones centrales
                    nodeTargetSelected.element.style.left = (nodeTargetSelected.x - parseSize / 2) + 'px';
                    nodeTargetSelected.element.style.top = (nodeTargetSelected.y - parseSize / 2) + 'px';
                    actualizarLineas();
                }
            }, 100);
        });

        document.getElementById('menu-text').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            ocultarMenu();
            setTimeout(() => {
                let nuevoNombre = prompt("Contenido del Nodo:", nodeTargetSelected.element.innerText);
                if (nuevoNombre !== null && nuevoNombre.trim() !== "") {
                    nodeTargetSelected.element.innerText = nuevoNombre;
                }
            }, 100);
        });

        document.getElementById('menu-connect').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            connectionSource = nodeTargetSelected;
            connectionSource.element.classList.add('node-connecting');
            ocultarMenu();
        });

        document.getElementById('menu-del').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (!nodeTargetSelected) return;
            connections = connections.filter(c => c.source !== nodeTargetSelected && c.target !== nodeTargetSelected);
            nodeTargetSelected.element.remove();
            nodes = nodes.filter(n => n.id !== nodeTargetSelected.id);
            actualizarLineas();
            ocultarMenu();
        });

        function finalizarConexion() {
            if (connectionSource) connectionSource.element.classList.remove('node-connecting');
            connectionSource = null;
        }

        function crearEnlace(src, tgt) {
            let existe = connections.some(c => (c.source.id === src.id && c.target.id === tgt.id) || (c.source.id === tgt.id && c.target.id === src.id));
            if (!existe) {
                connections.push({ source: src, target: tgt });
                actualizarLineas();
            }
        }

        function actualizarLineas() {
            svg.innerHTML = '';
            connections.forEach(c => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', c.source.x);
                line.setAttribute('y1', c.source.y);
                line.setAttribute('x2', c.target.x);
                line.setAttribute('y2', c.target.y);
                svg.appendChild(line);
            });
        }
    </script>
</body>
</html>
