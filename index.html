<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ÓMHNIBUS</title>
    <style>
        :root {
            --bg-color: #090d16;
            --node-bg: #1c2541;
            --node-text: #e2e8f0;
            --node-border: #5a9eff;
            --ui-bg: rgba(9, 13, 22, 0.95);
            --ui-text: #cbd5e1;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: sans-serif; }
        #viewport { width: 100vw; height: 100vh; position: absolute; }
        #infinite-canvas { position: absolute; width: 10000px; height: 10000px; background-size: 30px 30px; background-image: radial-gradient(circle, #ffffff11 1px, transparent 1px); }
        
        /* Panel de Estado */
        #status-panel { position: fixed; top: 15px; right: 15px; z-index: 500; background: var(--ui-bg); border: 1px solid #555; border-radius: 20px; padding: 12px; color: var(--ui-text); cursor: pointer; font-size: 12px; }
        .status-details { margin-top: 10px; border-top: 1px solid #444; padding-top: 5px; }

        /* Nodos y Centrado Perfecto */
        .node-container { position: absolute; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .node-body { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            text-align: center; border: 2px solid var(--node-border); 
            background: var(--node-bg); color: var(--node-text); 
            box-sizing: border-box; padding: 10px; border-radius: 10px;
        }
        .shape-circle { border-radius: 50%; }
        
        .top-settings-bar { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 400; background: var(--ui-bg); padding: 10px; border-radius: 30px; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="top-settings-bar">
        <button id="toggle-theme">Cambiar Modo</button>
    </div>

    <!-- Panel de Estado -->
    <div id="status-panel" onclick="document.getElementById('details').style.display = document.getElementById('details').style.display === 'none' ? 'block' : 'none'">
        <div id="summary">🕒 --:-- | ☁️ --°C | --, --</div>
        <div id="details" class="status-details" style="display:none;">
            <div id="full-date">Fecha: --</div>
            <div id="moon">Fase Lunar: --</div>
            <div id="loc">Ubicación: --</div>
            <div id="gyro">Giroscopio: --</div>
        </div>
    </div>

    <div id="viewport"><div id="infinite-canvas"></div></div>

    <script>
        let currentMode = 'dark';
        let nodes = [];

        // Lógica de colores adaptativos
        function getAdaptiveColor(hex, mode) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let l = (Math.max(r, g, b) + Math.min(r, g, b)) / 2;
            let newL = (mode === 'dark') ? Math.min(l, 0.3) : Math.max(l, 0.7);
            return `hsl(0, 0%, ${newL * 100}%)`;
        }

        document.getElementById('toggle-theme').onclick = () => {
            currentMode = currentMode === 'dark' ? 'light' : 'dark';
            document.body.style.backgroundColor = currentMode === 'dark' ? '#090d16' : '#f8fafc';
            nodes.forEach(n => {
                n.body.style.backgroundColor = getAdaptiveColor(n.bg || '#cccccc', currentMode);
                n.body.style.color = currentMode === 'dark' ? '#ffffff' : '#000000';
            });
        };

        // Lógica de Sensores y Panel
        function updateStatus() {
            const now = new Date();
            document.getElementById('summary').innerText = `${now.getHours()}:${now.getMinutes()} | ☀️ 22°C | UIO, EC`;
            document.getElementById('full-date').innerText = `Fecha: ${now.toLocaleDateString()}`;
            document.getElementById('moon').innerText = `Fase: 🌕`;
        }
        window.addEventListener('deviceorientation', (e) => {
            document.getElementById('gyro').innerText = `X:${Math.round(e.beta)} Y:${Math.round(e.gamma)}`;
        });
        setInterval(updateStatus, 1000);

        // Crear Nodo al hacer doble click
        document.getElementById('viewport').ondblclick = (e) => {
            const n = document.createElement('div');
            n.className = 'node-container';
            n.style.left = e.clientX + 'px'; n.style.top = e.clientY + 'px';
            n.style.width = '150px'; n.style.height = '150px';
            
            const b = document.createElement('div');
            b.className = 'node-body shape-circle';
            b.innerText = 'Texto Centrado';
            
            n.appendChild(b);
            document.getElementById('infinite-canvas').appendChild(n);
            nodes.push({body: b, bg: '#1c2541'});
        };
    </script>
</body>
</html>
