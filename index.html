<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #0b132b; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .node { position: absolute; width: 80px; height: 80px; background: #3a86ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; border: 4px solid white; }
    </style>
</head>
<body id="canvas">
    <div style="padding: 20px;">Toca dos veces para crear un Nodo. Arrastra para mover.</div>
    <script>
        let lastTap = 0;
        document.getElementById('canvas').addEventListener('touchend', (e) => {
            let now = new Date().getTime();
            if(now - lastTap < 300) {
                let n = document.createElement('div');
                n.className = 'node';
                n.style.left = (e.changedTouches[0].pageX - 40) + 'px';
                n.style.top = (e.changedTouches[0].pageY - 40) + 'px';
                
                n.addEventListener('touchmove', (ev) => {
                    n.style.left = (ev.touches[0].pageX - 40) + 'px';
                    n.style.top = (ev.touches[0].pageY - 40) + 'px';
                });
                
                document.body.appendChild(n);
            }
            lastTap = now;
        });
    </script>
</body>
</html>
