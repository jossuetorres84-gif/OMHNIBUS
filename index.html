<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÓMHNIBUS - Lienzo Infinito Estable</title>
    <style>
        :root {
            --bg-color: #090d16;
            --grid-color: rgba(58, 134, 255, 0.08);
            --grid-size: 30px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            overflow: hidden;
            touch-action: none;
        }

        #infinite-canvas {
            position: absolute;
            width: 10000px;
            height: 10000px;
            left: 0;
            top: 0;
            transform-origin: 0 0; /* Origen en esquina para control matricial preciso */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        line {
            stroke: rgba(58, 134, 255, 0.6);
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .node {
            position: absolute;
            width: 110px;
            height: 110px;
            background: rgba(28, 37, 65, 0.75);
            border: 2px solid rgba(90, 158, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
            font-size: 12px;
            color: #e2e8f0;
            font-weight: 500;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease, border-radius 0.2s ease, border-color 0.2s ease;
        }

        .shape-circle { border-radius: 50%; }
        .shape-square { border-radius: 14px; }
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); padding-top: 25px; height: 120px; }

        .node-active { transform: scale(1.05); border-color: #3a86ff; box-shadow: 0 0 20px rgba(58, 134, 255, 0.4); }
        .node-connecting { border-color: #ffbe0b; box-shadow: 0 0 20px rgba(255, 190, 11, 0.5); }

        .context-menu {
            position: absolute;
            background: rgba(9, 13, 22, 0.95);
            border: 1px solid rgba(58, 134, 255, 0.3);
            border-radius: 14px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .context-menu button {
            background: transparent;
            color: #cbd5e1;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            min-width: 140px;
            touch-action: none;
        }

        .context-menu button:active { background: rgba(58, 134, 255, 0.2); color: #3a86ff; }
        .context-menu .btn-del { color: #ff006e; }
        .context-menu .btn-del:active { background: rgba(255, 0, 110, 0.2); }

        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 11px;
            color: #64748b;
            pointer-events: none;
            background: rgba(9, 13, 22, 0.6);
            padding: 8px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="hud">
        🌌 Paneo: 1 Dedo | 📱 Zoom Fijo: 2 Dedos | 🔘 Doble Toque: Crear | 🎯 Presión Larga: Menú
    </div>

    <div id="viewport">
        <div id="infinite-canvas">
            <svg id="svg-connections"></svg>
        </div>
    </div>

    <div id="menu-contextual" class="context-menu">
        <button id="menu-text">✏️ Editar Texto</button>
        <button id="menu-connect">🔗 Conectar A...</button>
        <button id="menu-shape">📐 Cambiar Forma</button>
        <button id="menu-del" class="btn-del">🗑️ Eliminar Nodo</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('infinite-canvas');
        const svg = document.getElementById('svg-connections');
        const menu = document.getElementById('menu-contextual');

        // Inicializamos centrados en el lienzo de 10k x 10k
        let scale = 1;
        let panX = window.innerWidth / 2 - 5000;
        let panY = window.innerHeight / 2 - 5000;

        let isPanningCanvas = false;
        let startPanX = 0, startPanY = 0;
        let initPinchDist = 0;
        let initScale = 1;
        let lastTap = 0;
        
        // Bloqueadores de seguridad táctil
        let zoomActive = false;
        let blockTime = 0;

        let nodes = [];
        let connections = [];
        let nodeCount = 0;
        let nodeTargetSelected = null;
        let connectionSource = null;

        function applyTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }
        applyTransform();

        // --- SISTEMA DE ZOOM Y PANEO AVANZADO ---
        viewport.addEventListener('touchstart', (e) => {
            ocultarMenu();
            if (e.target !== viewport && e.target !== canvas && e.target.id !== 'svg-connections') return;

            if (e.touches.length === 1) {
                if (Date.now() - blockTime < 300) return; // Bloqueo anti-rebote post-zoom
                isPanningCanvas = true;
                startPanX = e.touches[0].clientX - panX;
                startPanY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isPanningCanvas = false;
                zoomActive = true;
                
                // Distancia inicial entre dos dedos
                initPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initScale = scale;
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (isPanningCanvas && e.touches.length === 1) {
                panX = e.touches[0].clientX - startPanX;
                panY = e.touches[0].clientY - startPanY;
                applyTransform();
            } else if (zoomActive && e.touches.length === 2) {
                // 1. Encontrar punto medio del pinch en pantalla global
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                // 2. Convertir ese punto a la posición matemática dentro del lienzo antes del zoom
                const canvasX = (midX - panX) / scale;
                const canvasY = (midY - panY) / scale;

                // 3. Calcular la nueva escala
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const prevScale = scale;
                scale = Math.min(Math.max(initScale * (dist / initPinchDist), 0.25), 2.5);

                // 4. Ajustar el desplazamiento (Pan) para mantener el punto focal fijo bajo los dedos
                panX = midX - canvasX * scale;
                panY = midY - canvasY * scale;

                applyTransform();
            }
        });

        viewport.addEventListener('touchend', (e) => {
            isPanningCanvas = false;
            
            if (e.touches.length === 0 && zoomActive) {
                zoomActive = false;
                blockTime = Date.now(); // Guardar estampa de tiempo al soltar el zoom
            }

            if (e.target === viewport || e.target === canvas || e.target.id === 'svg-connections') {
                let now = Date.now();
                
                // CONDICIÓN: No crear nodos si se usó zoom recientemente o si hay dedos activos
                if (now - lastTap < 300 && !zoomActive && (now - blockTime > 400)) {
                    let touch = e.changedTouches[0];
                    const xOnCanvas = (touch.clientX - panX) / scale;
                    const yOnCanvas = (touch.clientY - panY) / scale;

                    createNode(xOnCanvas, yOnCanvas);
                }
                lastTap = now;
            }
        });

        // --- SISTEMA DE NODOS ---
        function createNode(x, y) {
            nodeCount++;
            const id = 'node_' + Date.now();
            
            const n = document.createElement('div');
            n.id = id;
            n.className = 'node shape-circle';
            n.innerText = 'Nodo ' + nodeCount;
            n.style.left = (x - 55) + 'px';
            n.style.top = (y - 55) + 'px';

            const nodeObj = { id, element: n, x: x, y: y, shape: 'circle' };
            nodes.push(nodeObj);

            let isDraggingNode = false;
            let pressTimer = null;

            n.addEventListener('touchstart', (ev) => {
                ev.stopPropagation();
                ocultarMenu();
                if (connectionSource) return;

                n.classList.add('node-active');
                pressTimer = setTimeout(() => {
                    isDraggingNode = false;
                    n.classList.remove('node-active');
                    abrirMenu(nodeObj, ev.touches[0].clientX, ev.touches[0].clientY);
                }, 550);

                isDraggingNode = true;
            });

            n.addEventListener('touchmove', (ev) => {
                if (!isDraggingNode) return;
                clearTimeout(pressTimer);

                let touch = ev.touches[0];
                const currentX = (touch.clientX - panX) / scale;
                const currentY = (touch.clientY - panY) / scale;

                nodeObj.x = currentX;
                nodeObj.y = currentY;
                n.style.left = (currentX - 55) + 'px';
                n.style.top = (currentY - 55) + 'px';

                actualizarLineas();
            });

            n.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
                isDraggingNode = false;
                n.classList.remove('node-active');

                if (connectionSource && connectionSource !== nodeObj) {
                    crearEnlace(connectionSource, nodeObj);
                    finalizarConexion();
                }
            });

            canvas.appendChild(n);
            actualizarLineas();
        }

        // --- INTERFAZ MENÚ CONTEXTUAL ---
        function abrirMenu(nodeObj, clientX, clientY) {
            nodeTargetSelected = nodeObj;
            menu.style.display = 'flex';
            menu.style.left = Math.min(clientX, window.innerWidth - 160) + 'px';
            menu.style.top = Math.min(clientY, window.innerHeight - 200) + 'px';
        }

        function ocultarMenu() { menu.style.display = 'none'; }

        document.getElementById('menu-del').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (!nodeTargetSelected) return;
            connections = connections.filter(c => c.source !== nodeTargetSelected && c.target !== nodeTargetSelected);
            nodeTargetSelected.element.remove();
            nodes = nodes.filter(n => n.id !== nodeTargetSelected.id);
            actualizarLineas();
            ocultarMenu();
        });

        document.getElementById('menu-shape').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (!nodeTargetSelected) return;
            const el = nodeTargetSelected.element;
            if (nodeTargetSelected.shape === 'circle') {
                el.classList.replace('shape-circle', 'shape-square');
                nodeTargetSelected.shape = 'square';
            } else if (nodeTargetSelected.shape === 'square') {
                el.classList.replace('shape-square', 'shape-triangle');
                nodeTargetSelected.shape = 'triangle';
            } else {
                el.classList.replace('shape-triangle', 'shape-circle');
                nodeTargetSelected.shape = 'circle';
            }
            ocultarMenu();
        });

        document.getElementById('menu-text').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            ocultarMenu();
            setTimeout(() => {
                let nuevoNombre = prompt("Contenido del Nodo:", nodeTargetSelected.element.innerText);
                if (nuevoNombre !== null && nuevoNombre.trim() !== "") {
                    nodeTargetSelected.element.innerText = nuevoNombre;
                }
            }, 100);
        });

        document.getElementById('menu-connect').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            connectionSource = nodeTargetSelected;
            connectionSource.element.classList.add('node-connecting');
            ocultarMenu();
        });

        function finalizarConexion() {
            if (connectionSource) connectionSource.element.classList.remove('node-connecting');
            connectionSource = null;
        }

        function crearEnlace(src, tgt) {
            let existe = connections.some(c => (c.source.id === src.id && c.target.id === tgt.id) || (c.source.id === tgt.id && c.target.id === src.id));
            if (!existe) {
                connections.push({ source: src, target: tgt });
                actualizarLineas();
            }
        }

        function actualizarLineas() {
            svg.innerHTML = '';
            connections.forEach(c => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', c.source.x);
                line.setAttribute('y1', c.source.y);
                line.setAttribute('x2', c.target.x);
                line.setAttribute('y2', c.target.y);
                svg.appendChild(line);
            });
        }
    </script>
</body>
</html>
