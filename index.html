<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÓMHNIBUS - Canvas Inteligente</title>
    <style>
        :root {
            --bg-color: #090d16;
            --grid-color: rgba(58, 134, 255, 0.08);
            --grid-size: 30px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            overflow: hidden;
            touch-action: none;
        }

        #infinite-canvas {
            position: absolute;
            width: 10000px;
            height: 10000px;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        line {
            stroke: rgba(58, 134, 255, 0.6);
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .node-container {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }

        .node-body {
            width: 100%;
            height: 100%;
            background: rgba(28, 37, 65, 0.75);
            border: 2px solid rgba(90, 158, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            color: #e2e8f0;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Formas Geométricas */
        .shape-circle { border-radius: 50%; clip-path: none; }
        .shape-square { border-radius: 14px; clip-path: none; }
        .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); padding-top: 20px; }
        .shape-pentagon { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); padding-top: 10px; }
        .shape-hexagon { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        .shape-rhombus { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

        .container-selected .node-body {
            border-color: #3a86ff;
            box-shadow: 0 0 25px rgba(58, 134, 255, 0.5);
        }
        .node-connecting .node-body {
            border-color: #ffbe0b;
            box-shadow: 0 0 25px rgba(255, 190, 11, 0.6);
        }

        /* Manejadores Visuales */
        .handle {
            position: absolute;
            display: none;
            width: 24px;
            height: 24px;
            background: #3a86ff;
            border: 2px solid #ffffff;
            border-radius: 50%;
            z-index: 50;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            touch-action: none;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .container-selected .handle { display: flex; }
        .handle-resize { right: -10px; bottom: -10px; cursor: se-resize; }
        .handle-rotate { top: -35px; left: calc(50% - 12px); background: #00f5d4; cursor: grab; }

        .container-selected::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            width: 2px;
            height: 35px;
            background: rgba(58, 134, 255, 0.5);
            z-index: 40;
            display: none;
        }
        .container-selected::before { display: block; }

        /* Menús Contextuales */
        .context-menu {
            position: absolute;
            background: rgba(9, 13, 22, 0.95);
            border: 1px solid rgba(58, 134, 255, 0.3);
            border-radius: 14px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .context-menu button {
            background: transparent;
            color: #cbd5e1;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            min-width: 150px;
            touch-action: none;
        }

        .context-menu button:active { background: rgba(58, 134, 255, 0.2); color: #3a86ff; }
        .context-menu .btn-del { color: #ff006e; }
        .context-menu .btn-del:active { background: rgba(255, 0, 110, 0.2); }

        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 11px;
            color: #64748b;
            pointer-events: none;
            background: rgba(9, 13, 22, 0.6);
            padding: 8px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="hud">
        🌌 ÓMHNIBUS Core | 🔘 Doble Toque Fondo: Crear | 🔘 Doble Toque Figura: Editar Texto | 🎯 Mantener: Menú
    </div>

    <div id="viewport">
        <div id="infinite-canvas">
            <svg id="svg-connections"></svg>
        </div>
    </div>

    <div id="menu-contextual" class="context-menu">
        <button id="menu-connect">🔗 Conectar A...</button>
        <button id="menu-shape-trigger">💎 Cambiar Forma ➔</button>
        <button id="menu-del" class="btn-del">🗑️ Eliminar Nodo</button>
    </div>

    <div id="menu-formas" class="context-menu">
        <button onclick="setShape('circle')">🔘 Círculo</button>
        <button onclick="setShape('square')">⬛ Cuadrado</button>
        <button onclick="setShape('triangle')">🔺 Triángulo</button>
        <button onclick="setShape('pentagon')">⬠ Pentágono</button>
        <button onclick="setShape('hexagon')">⬢ Hexágono</button>
        <button onclick="setShape('rhombus')">🔷 Rombo</button>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('infinite-canvas');
        const svg = document.getElementById('svg-connections');
        const menu = document.getElementById('menu-contextual');
        const menuFormas = document.getElementById('menu-formas');

        let scale = 1;
        let panX = window.innerWidth / 2 - 5000;
        let panY = window.innerHeight / 2 - 5000;

        let isPanningCanvas = false;
        let startPanX = 0, startPanY = 0;
        let initPinchDist = 0;
        let initScale = 1;
        let lastTap = 0;
        
        let zoomActive = false;
        let blockTime = 0;

        let nodes = [];
        let connections = [];
        let nodeCount = 0;
        let nodeTargetSelected = null;
        let connectionSource = null;

        function applyTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }
        applyTransform();

        // Control de fondo vacío
        viewport.addEventListener('touchstart', (e) => {
            ocultarMenu();
            if (e.target === viewport || e.target === canvas || e.target.id === 'svg-connections') {
                nodes.forEach(n => n.container.classList.remove('container-selected'));
                
                if (e.touches.length === 1) {
                    if (Date.now() - blockTime < 300) return;
                    isPanningCanvas = true;
                    startPanX = e.touches[0].clientX - panX;
                    startPanY = e.touches[0].clientY - panY;
                } else if (e.touches.length === 2) {
                    isPanningCanvas = false;
                    zoomActive = true;
                    initPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    initScale = scale;
                }
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (isPanningCanvas && e.touches.length === 1) {
                panX = e.touches[0].clientX - startPanX;
                panY = e.touches[0].clientY - startPanY;
                applyTransform();
            } else if (zoomActive && e.touches.length === 2) {
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const canvasX = (midX - panX) / scale;
                const canvasY = (midY - panY) / scale;
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                scale = Math.min(Math.max(initScale * (dist / initPinchDist), 0.25), 2.5);
                panX = midX - canvasX * scale;
                panY = midY - canvasY * scale;
                applyTransform();
            }
        });

        viewport.addEventListener('touchend', (e) => {
            isPanningCanvas = false;
            if (e.touches.length === 0 && zoomActive) {
                zoomActive = false;
                blockTime = Date.now();
            }

            if (e.target === viewport || e.target === canvas || e.target.id === 'svg-connections') {
                let now = Date.now();
                if (now - lastTap < 300 && !zoomActive && (now - blockTime > 400)) {
                    let touch = e.changedTouches[0];
                    const xOnCanvas = (touch.clientX - panX) / scale;
                    const yOnCanvas = (touch.clientY - panY) / scale;
                    createNode(xOnCanvas, yOnCanvas);
                }
                lastTap = now;
            }
        });

        // --- SISTEMA DE CREACIÓN DE NODOS ---
        function createNode(x, y) {
            nodeCount++;
            
            const container = document.createElement('div');
            container.className = 'node-container';
            
            const body = document.createElement('div');
            body.className = 'node-body shape-circle';
            body.innerText = 'Nodo ' + nodeCount;
            
            const handleResize = document.createElement('div');
            handleResize.className = 'handle handle-resize';
            handleResize.innerHTML = '📐';

            const handleRotate = document.createElement('div');
            handleRotate.className = 'handle handle-rotate';
            handleRotate.innerHTML = '🔄';

            container.appendChild(body);
            container.appendChild(handleResize);
            container.appendChild(handleRotate);

            const nodeObj = { 
                container, body, x, y, 
                width: 110, height: 110, 
                rotation: 0, shape: 'circle' 
            };
            nodes.push(nodeObj);

            function updateNodeStyle() {
                container.style.width = nodeObj.width + 'px';
                container.style.height = nodeObj.height + 'px';
                container.style.left = (nodeObj.x - nodeObj.width / 2) + 'px';
                container.style.top = (nodeObj.y - nodeObj.height / 2) + 'px';
                container.style.transform = `rotate(${nodeObj.rotation}deg)`;
            }
            updateNodeStyle();

            let isDragging = false;
            let pressTimer = null;
            let lastNodeTap = 0; // Rastreo específico de doble toque en la figura

            body.addEventListener('touchstart', (ev) => {
                ev.stopPropagation();
                ocultarMenu();
                
                let now = Date.now();
                
                // DETECCIÓN DE DOBLE TOQUE DIRECTO PARA EDITAR TEXTO
                if (now - lastNodeTap < 300) {
                    clearTimeout(pressTimer);
                    isDragging = false;
                    
                    setTimeout(() => {
                        let nuevoTexto = prompt("Modificar contenido del nodo:", body.innerText);
                        if (nuevoTexto !== null && nuevoTexto.trim() !== "") {
                            body.innerText = nuevoTexto;
                        }
                    }, 50);
                    
                    lastNodeTap = now;
                    return;
                }
                lastNodeTap = now;

                nodes.forEach(n => n.container.classList.remove('container-selected'));
                container.classList.add('container-selected');

                if (connectionSource && connectionSource !== nodeObj) {
                    crearEnlace(connectionSource, nodeObj);
                    finalizarConexion();
                    return;
                }

                pressTimer = setTimeout(() => {
                    isDragging = false;
                    abrirMenu(nodeObj, ev.touches[0].clientX, ev.touches[0].clientY);
                }, 550);

                isDragging = true;
            });

            body.addEventListener('touchmove', (ev) => {
                if (!isDragging) return;
                clearTimeout(pressTimer);

                let touch = ev.touches[0];
                nodeObj.x = (touch.clientX - panX) / scale;
                nodeObj.y = (touch.clientY - panY) / scale;
                
                updateNodeStyle();
                actualizarLineas();
            });

            body.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
                isDragging = false;
            });

            // Manejador de tamaño
            let isResizing = false;
            let startW = 0, startH = 0, startTouchX = 0, startTouchY = 0;

            handleResize.addEventListener('touchstart', (ev) => {
                ev.stopPropagation();
                isResizing = true;
                startW = nodeObj.width;
                startH = nodeObj.height;
                startTouchX = ev.touches[0].clientX;
                startTouchY = ev.touches[0].clientY;
            });

            window.addEventListener('touchmove', (ev) => {
                if (!isResizing) return;
                let deltaX = (ev.touches[0].clientX - startTouchX) / scale;
                let deltaY = (ev.touches[0].clientY - startTouchY) / scale;

                nodeObj.width = Math.min(Math.max(startW + deltaX, 50), 400);
                nodeObj.height = Math.min(Math.max(startH + deltaY, 50), 400);

                updateNodeStyle();
                actualizarLineas();
            });

            window.addEventListener('touchend', () => { isResizing = false; });

            // Manejador de rotación
            let isRotating = false;
            handleRotate.addEventListener('touchstart', (ev) => {
                ev.stopPropagation();
                isRotating = true;
            });

            window.addEventListener('touchmove', (ev) => {
                if (!isRotating) return;
                let touch = ev.touches[0];
                const rect = body.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const radians = Math.atan2(touch.clientX - centerX, -(touch.clientY - centerY));
                nodeObj.rotation = radians * (180 / Math.PI);
                updateNodeStyle();
            });

            window.addEventListener('touchend', () => { isRotating = false; });

            canvas.appendChild(container);
            actualizarLineas();
        }

        // --- MENÚ CONTEXTUAL ---
        function abrirMenu(nodeObj, clientX, clientY) {
            nodeTargetSelected = nodeObj;
            menu.style.display = 'flex';
            menu.style.left = Math.min(clientX, window.innerWidth - 170) + 'px';
            menu.style.top = Math.min(clientY, window.innerHeight - 220) + 'px';
        }

        function ocultarMenu() { 
            menu.style.display = 'none'; 
            menuFormas.style.display = 'none';
        }

        document.getElementById('menu-shape-trigger').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            menuFormas.style.display = 'flex';
            menuFormas.style.left = (parseFloat(menu.style.left) + 40) + 'px';
            menuFormas.style.top = (parseFloat(menu.style.top) + 40) + 'px';
        });

        function setShape(newShape) {
            if (!nodeTargetSelected) return;
            const b = nodeTargetSelected.body;
            b.className = 'node-body';
            b.classList.add('shape-' + newShape);
            nodeTargetSelected.shape = newShape;
            ocultarMenu();
        }

        document.getElementById('menu-connect').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            connectionSource = nodeTargetSelected;
            connectionSource.container.classList.add('node-connecting');
            ocultarMenu();
        });

        document.getElementById('menu-del').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            if (!nodeTargetSelected) return;
            connections = connections.filter(c => c.source !== nodeTargetSelected && c.target !== nodeTargetSelected);
            nodeTargetSelected.container.remove();
            nodes = nodes.filter(n => n.container !== nodeTargetSelected.container);
            actualizarLineas();
            ocultarMenu();
        });

        function finalizarConexion() {
            if (connectionSource) connectionSource.container.classList.remove('node-connecting');
            connectionSource = null;
        }

        function crearEnlace(src, tgt) {
            let existe = connections.some(c => (c.source.container === src.container && c.target.container === tgt.container) || (c.source.container === tgt.container && c.target.container === src.container));
            if (!existe) {
                connections.push({ source: src, target: tgt });
                actualizarLineas();
            }
        }

        function actualizarLineas() {
            svg.innerHTML = '';
            connections.forEach(c => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', c.source.x);
                line.setAttribute('y1', c.source.y);
                line.setAttribute('x2', c.target.x);
                line.setAttribute('y2', c.target.y);
                svg.appendChild(line);
            });
        }
    </script>
</body>
</html>
