<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #fdfbf7; 
            transition: background-color 0.3s ease;
            touch-action: none; 
        }

        /* Variables de estado */
        body.dark-mode { background-color: #1a1a1a; }
        body.dark-mode #canvas-container { background-image: radial-gradient(#333 1px, transparent 1px); }

        #canvas-container {
            width: 100vw; 
            height: 100vh;
            cursor: grab;
            transform-origin: 0 0;
            background-image: radial-gradient(#dcdcdc 1px, transparent 1px);
            background-size: 40px 40px;
            /* Aseguramos que ocupe todo el espacio pero no interfiera con el botón */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            z-index: 1000; /* Siempre encima del lienzo */
            cursor: pointer;
            background: #e0dcd5;
            border: none;
            border-radius: 5px;
            font-family: sans-serif;
            font-weight: bold;
        }
        body.dark-mode #theme-toggle { background: #333; color: white; }
    </style>
</head>
<body>

<button id="theme-toggle">Modo Oscuro</button>
<div id="canvas-container"></div>

<script>
    const container = document.getElementById('canvas-container');
    const themeBtn = document.getElementById('theme-toggle');
    let scale = 1;
    let posX = 0;
    let posY = 0;
    let isDragging = false;
    let startX, startY;

    // Función de cambio de modo (Preservada)
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        themeBtn.innerText = document.body.classList.contains('dark-mode') ? 'Modo Claro' : 'Modo Oscuro';
    });

    // Lógica de Zoom (Restaurada y Verificada)
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta;
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }, { passive: false });

    // Lógica de Desplazamiento (Restaurada y Verificada)
    container.addEventListener('pointerdown', (e) => {
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
        container.style.cursor = 'grabbing';
        container.setPointerCapture(e.pointerId);
    });

    container.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    });

    container.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        container.style.cursor = 'grab';
        container.releasePointerCapture(e.pointerId);
    });
    
    container.addEventListener('pointercancel', () => {
        isDragging = false;
    });
</script>
</body>
</html>
