<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÓMHNIBUS Core Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans antialiased">

  <div class="flex flex-col h-screen max-w-2xl mx-auto p-4 justify-between">
    <header class="flex justify-between items-center py-2 border-b border-slate-800">
      <div class="flex items-center gap-2">
        <h1 class="text-xl font-bold tracking-widest text-teal-400">ÓMHNIBUS</h1>
        <span id="router-status" class="text-[10px] bg-teal-950 text-teal-400 px-2 py-0.5 rounded-full font-mono border border-teal-800">ROUTER ACTIVO</span>
      </div>
      <button onclick="toggleKeyManager()" class="text-xs bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-teal-300 font-semibold">🔑 Conectores</button>
    </header>

    <div id="key-manager" class="hidden flex-1 flex flex-col justify-center px-4 space-y-3">
      <h3 class="text-sm font-semibold text-center text-teal-400">Panel de Conectores Cloud</h3>
      <div id="debug-keys" class="text-[10px] text-amber-500 font-mono text-center bg-amber-950/30 p-1 rounded border border-amber-900/50"></div>
      <div class="space-y-2 text-xs">
        <div><label class="text-slate-400">Google Gemini Key:</label><input type="password" id="key-gemini" placeholder="AIzaSy..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none"></div>
        <div><label class="text-slate-400">OpenAI GPT Key:</label><input type="password" id="key-openai" placeholder="sk-..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none"></div>
        <div><label class="text-slate-400">OpenRouter Key:</label><input type="password" id="key-openrouter" placeholder="sk-or-..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none"></div>
        <div><label class="text-slate-400">Groq Key:</label><input type="password" id="key-groq" placeholder="gsk_..." class="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 mt-1 text-white focus:outline-none"></div>
      </div>
      <button onclick="saveAllKeys()" class="w-full bg-teal-600 hover:bg-teal-500 text-white py-2 rounded-lg text-xs font-semibold">Fijar Llaves</button>
    </div>

    <main id="chat-screen" class="flex-1 overflow-y-auto my-4 space-y-4 pr-1 text-sm scroll-smooth">
      <div id="empty-notice" class="text-center text-slate-600 mt-20 text-xs px-4">Ecosistema listo. Lanza una instrucción.</div>
      <div id="messages-container" class="space-y-4 flex flex-col"></div>
    </main>

    <footer id="controls-footer" class="space-y-2">
      <button id="council-toggle-btn" class="w-full bg-slate-900 border border-slate-800 py-2 rounded-xl flex items-center justify-center gap-2 text-xs font-semibold transition-all">
        <span class="w-2 h-2 rounded-full bg-slate-500" id="council-indicator"></span>
        <span id="council-btn-text" class="text-slate-400">ÓMHNIBUS COUNCIL: DESACTIVADO</span>
      </button>

      <!-- Selector de Modelos Groq Añadido Basado en capturas 1000480724 y 1000480725 -->
      <div class="flex items-center gap-2 bg-slate-950/50 p-1.5 border border-slate-800/60 rounded-xl text-[11px]">
        <span class="text-slate-400 pl-1 font-mono">Groq Model:</span>
        <select id="groq-model-select" class="flex-1 bg-slate-900 text-teal-300 border border-slate-800 rounded px-2 py-1 focus:outline-none font-mono">
          <option value="openai/gpt-oss-120b">openai/gpt-oss-120b (Recomendado)</option>
          <option value="openai/gpt-oss-20b">openai/gpt-oss-20b</option>
          <option value="meta-llama/llama-4-scout-17b-16e-instruct">meta-llama/llama-4-scout-17b</option>
          <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
          <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
          <option value="qwen/qwen3-32b">qwen/qwen3-32b</option>
          <option value="qwen/qwen3.6-27b">qwen/qwen3.6-27b</option>
          <option value="groq/compound">groq/compound</option>
          <option value="groq/compound-mini">groq/compound-mini</option>
          <option value="openai/gpt-oss-safeguard-20b">openai/gpt-oss-safeguard-20b</option>
        </select>
      </div>

      <div class="flex gap-2">
        <input type="text" id="user-input" placeholder="Escribe tu instrucción..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-teal-500">
        <button id="launch-btn" class="bg-teal-600 hover:bg-teal-500 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Lanzar</button>
      </div>
    </footer>
  </div>

  <script>
    const keys = {
      gemini: localStorage.getItem('_om_key_gemini') || '',
      openai: localStorage.getItem('_om_key_openai') || '',
      openrouter: localStorage.getItem('_om_key_openrouter') || '',
      groq: localStorage.getItem('_om_key_groq') || ''
    };

    const corsProxy = "https://corsproxy.io/?";

    document.getElementById('key-gemini').value = keys.gemini;
    document.getElementById('key-openai').value = keys.openai;
    document.getElementById('key-openrouter').value = keys.openrouter;
    document.getElementById('key-groq').value = keys.groq;
    
    document.getElementById('debug-keys').innerText = `Nodos: Gemini (${keys.gemini?'OK':'NO'}) | Groq (${keys.groq?'OK':'NO'})`;

    function toggleKeyManager() {
      const manager = document.getElementById('key-manager');
      const chat = document.getElementById('chat-screen');
      const isHidden = manager.classList.toggle('hidden');
      if (!isHidden) { chat.style.display = 'none'; } else { chat.style.display = 'block'; }
    }

    function saveAllKeys() {
      localStorage.setItem('_om_key_gemini', document.getElementById('key-gemini').value.trim());
      localStorage.setItem('_om_key_openai', document.getElementById('key-openai').value.trim());
      localStorage.setItem('_om_key_openrouter', document.getElementById('key-openrouter').value.trim());
      localStorage.setItem('_om_key_groq', document.getElementById('key-groq').value.trim());
      location.reload();
    }

    let useCouncil = false;
    document.getElementById('council-toggle-btn').addEventListener('click', () => {
      useCouncil = !useCouncil;
      const indicator = document.getElementById('council-indicator');
      const text = document.getElementById('council-btn-text');
      if(useCouncil) {
        indicator.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse";
        text.innerText = 'ÓMHNIBUS COUNCIL: MODO SECUENCIAL ACTIVO';
        text.className = 'text-amber-400 font-semibold';
      } else {
        indicator.className = "w-2 h-2 rounded-full bg-slate-500";
        text.innerText = 'ÓMHNIBUS COUNCIL: DESACTIVADO';
        text.className = 'text-slate-400';
      }
    });

    function createEngineBlock(name) {
      const div = document.createElement('div');
      div.className = 'p-3 bg-slate-900 border border-slate-800 rounded-xl text-xs space-y-1 my-1 max-w-[90%] self-start w-full shadow-md';
      div.innerHTML = `
        <div class="flex justify-between items-center border-b border-slate-800 pb-1">
          <span class="font-bold text-teal-400">🤖 ${name}</span>
          <span class="text-[9px] text-amber-400 animate-pulse font-mono tracking-wider">CONECTANDO...</span>
        </div>
        <div class="mt-1 text-slate-300 whitespace-pre-wrap leading-relaxed">Procesando transmisión de datos...</div>`;
      document.getElementById('messages-container').appendChild(div);
      const screen = document.getElementById('chat-screen');
      screen.scrollTop = screen.scrollHeight;
      return { content: div.children[1], status: div.children[0].children[1] };
    }

    function appendUserMessage(text) {
      const container = document.getElementById('messages-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'p-3 rounded-2xl max-w-[85%] bg-teal-600 text-white ml-auto whitespace-pre-wrap text-sm shadow-md my-1 self-end';
      msgDiv.innerText = text;
      container.appendChild(msgDiv);
    }

    // MANTENIDO EN PRODUCCIÓN: Endpoint Gemini 3.5 Flash intacto
    async function fetchGemini(prompt) {
      const ui = createEngineBlock('Gemini 3.5 Flash');
      if (!keys.gemini) { ui.content.innerText = "Falta llave de Gemini."; ui.status.innerText = "⚠️ VACÍO"; return; }
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent?key=${keys.gemini}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        if(data.candidates && data.candidates[0].content.parts[0].text) {
          ui.content.innerText = data.candidates[0].content.parts[0].text;
          ui.status.innerText = "🟢 NODO ONLINE";
          ui.status.className = "text-[9px] text-green-400 font-mono";
        } else {
          ui.content.innerText = "Respuesta del endpoint: " + JSON.stringify(data);
          ui.status.innerText = "🔴 ADVERTENCIA";
        }
      } catch (err) { 
        ui.content.innerText = "Error de conexión con el nodo Gemini 3.5."; 
        ui.status.innerText = "🔴 ERROR";
        ui.status.className = "text-[9px] text-red-500 font-mono";
      }
    }

    // ACTUALIZADO: Envío directo con proxy limpio y lectura del Dropdown dinámico
    async function fetchGroq(prompt) {
      const selectedModel = document.getElementById('groq-model-select').value;
      const ui = createEngineBlock(`Groq (${selectedModel.split('/').pop()})`);
      if (!keys.groq) { ui.content.innerText = "Falta llave de Groq."; ui.status.innerText = "⚠️ VACÍO"; return; }
      try {
        const targetUrl = 'https://api.groq.com/openai/v1/chat/completions';
        
        const res = await fetch(corsProxy + encodeURIComponent(targetUrl), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${keys.groq}`
          },
          body: JSON.stringify({ 
            model: selectedModel, 
            messages: [{ role: 'user', content: prompt }] 
          })
        });

        const data = await res.json();

        if (data.choices && data.choices[0].message.content) {
          ui.content.innerText = data.choices[0].message.content;
          ui.status.innerText = "🟢 NODO ONLINE";
          ui.status.className = "text-[9px] text-green-400 font-mono";
        } else {
          ui.content.innerText = "Error en respuesta Groq: " + JSON.stringify(data);
          ui.status.innerText = "🔴 ADVERTENCIA";
        }
      } catch (err) { 
        ui.content.innerText = "Error crítico de bypass CORS con Groq."; 
        ui.status.innerText = "🔴 ERROR";
        ui.status.className = "text-[9px] text-red-500 font-mono";
      }
    }

    async function fetchOpenAI(prompt) {
      const ui = createEngineBlock('OpenAI GPT-4o-mini');
      if (!keys.openai) { ui.content.innerText = "Falta llave de OpenAI."; ui.status.innerText = "⚠️ VACÍO"; return; }
      try {
        const res = await fetch(corsProxy + encodeURIComponent('https://api.openai.com/v1/chat/completions'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.openai}` },
          body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }] })
        });
        const data = await res.json();
        ui.content.innerText = data.choices[0].message.content;
        ui.status.innerText = "🟢 NODO ONLINE";
        ui.status.className = "text-[9px] text-green-400 font-mono";
      } catch (err) { 
        ui.content.innerText = "Error en canal OpenAI."; 
        ui.status.innerText = "🔴 ERROR";
      }
    }

    document.getElementById('launch-btn').onclick = async () => {
      const inputEl = document.getElementById('user-input');
      const prompt = inputEl.value.trim();
      if (!prompt) return;

      inputEl.value = '';
      document.getElementById('empty-notice').classList.add('hidden');
      appendUserMessage(prompt);

      if (useCouncil) {
        await fetchGemini(prompt);
        if (keys.openai) await fetchOpenAI(prompt);
        if (keys.groq)   await fetchGroq(prompt);
      } else {
        await fetchGemini(prompt);
      }
    };
  </script>
</body>
</html>
