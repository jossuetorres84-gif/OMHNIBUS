<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÓMHNIBUS</title>
  <!-- Tailwind CSS para el diseño responsivo e impecable -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans antialiased">

  <div class="flex flex-col h-screen max-w-2xl mx-auto p-4 justify-between">
    <!-- Encabezado -->
    <header class="flex justify-between items-center py-2 border-b border-slate-800">
      <h1 class="text-xl font-bold tracking-widest text-teal-400">ÓMHNIBUS</h1>
      <div id="status-tag" class="text-xs text-slate-400 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
        🔴 Requiere Key
      </div>
    </header>

    <!-- Pantalla de Configuración Inicial (API Key Gratis) -->
    <div id="setup-screen" class="flex-1 flex flex-col justify-center items-center px-4 space-y-4">
      <p class="text-center text-sm text-slate-400 max-w-xs">
        Introduce tu API Key gratuita de Google AI Studio para activar ÓMHNIBUS en la nube.
      </p>
      <input
        type="password"
        id="api-key-input"
        placeholder="AIzaSy..."
        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-center text-white focus:outline-none focus:border-teal-500"
      >
      <button
        onclick="initializeSystem()"
        class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors"
      >
        Vincular Servidor Cloud
      </button>
    </div>

    <!-- Lienzo de Chat (Oculto al inicio) -->
    <main id="chat-screen" class="hidden flex-1 overflow-y-auto my-4 space-y-3 pr-1 text-sm">
      <div id="empty-notice" class="text-center text-slate-600 mt-20">
        Lienzo modular listo. Envía una instrucción o código.
      </div>
      <div id="messages-container" class="space-y-3"></div>
      <div id="loading-indicator" class="hidden text-xs text-slate-500 animate-pulse">
        ÓMHNIBUS procesando en la nube...
      </div>
    </main>

    <!-- Panel de control inferior (Oculto al inicio) -->
    <footer id="controls-footer" class="hidden space-y-2">
      <div class="flex items-center justify-between bg-slate-900/50 p-2 rounded-lg border border-slate-800/60 text-xs">
        <span class="text-slate-400">Activar ÓmhnibusCouncil (Multi-Agente)</span>
        <button
          id="council-btn"
          onclick="toggleCouncil()"
          class="w-9 h-5 flex items-center bg-slate-700 rounded-full p-1 duration-200"
        >
          <span id="council-dot" class="bg-white w-3 h-3 rounded-full shadow-sm transition-transform"></span>
        </button>
      </div>
      <div class="flex gap-2">
        <input
          type="text"
          id="user-input"
          placeholder="Escribe una instrucción..."
          class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-teal-500"
          onkeypress="if(event.key === 'Enter') sendPrompt()"
        >
        <button
          onclick="sendPrompt()"
          class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-lg text-sm font-semibold"
        >
          Enviar
        </button>
      </div>
    </footer>
  </div>

  <!-- Lógica e Integración con la nube de Google -->
  <script>
    let apiKey = localStorage.getItem('_omhnibus_key') || '';
    let useCouncil = false;

    if (apiKey) {
      showChatStructure();
    }

    function initializeSystem() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) return alert('Por favor introduce una clave válida.');
      apiKey = key;
      localStorage.setItem('_omhnibus_key', key);
      showChatStructure();
    }

    function showChatStructure() {
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('chat-screen').classList.remove('hidden');
      document.getElementById('controls-footer').classList.remove('hidden');
      const status = document.getElementById('status-tag');
      status.innerText = '🟢 Conectado';
      status.classList.replace('text-slate-400', 'text-teal-400');
    }

    function toggleCouncil() {
      useCouncil = !useCouncil;
      const btn = document.getElementById('council-btn');
      const dot = document.getElementById('council-dot');
      if (useCouncil) {
        btn.classList.replace('bg-slate-700', 'bg-teal-500');
        dot.classList.add('translate-x-4');
      } else {
        btn.classList.replace('bg-teal-500', 'bg-slate-700');
        dot.classList.remove('translate-x-4');
      }
    }

    async function sendPrompt() {
      const inputEl = document.getElementById('user-input');
      const prompt = inputEl.value.trim();
      if (!prompt) return;

      inputEl.value = '';
      document.getElementById('empty-notice').classList.add('hidden');
      appendMessage('user', prompt);

      const loader = document.getElementById('loading-indicator');
      loader.classList.remove('hidden');

      try {
        // Estructura del prompt agnóstica
        let finalPrompt = prompt;
        if (useCouncil) {
          finalPrompt = `Actúas como un Consejo de Expertos en IA (ÓmhnibusCouncil). 
Debatid internamente la siguiente solicitud desde los roles de Skeptical Architect, Security Auditor y Performance Expert.
Generad una única respuesta técnica maestra perfectamente optimizada:\n\n${prompt}`;
        }

        // Llamada directa y gratuita al SDK de Gemini en la nube
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
        });

        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;
        appendMessage('system', reply);
      } catch (err) {
        appendMessage('system', 'Error al procesar en la nube. Verifica tu API Key.');
      } finally {
        loader.classList.add('hidden');
      }
    }

    function appendMessage(sender, text) {
      const container = document.getElementById('messages-container');
      const msgDiv = document.createElement('div');
      msgDiv.className = sender === 'user' 
        ? 'p-3 rounded-lg max-w-[85%] bg-teal-600 text-white ml-auto whitespace-pre-wrap'
        : 'p-3 rounded-lg max-w-[85%] bg-slate-900 border border-slate-800 text-slate-200 whitespace-pre-wrap';
      msgDiv.innerText = text;
      container.appendChild(msgDiv);
      document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;
    }
  </script>
</body>
</html>
