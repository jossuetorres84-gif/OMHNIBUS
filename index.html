<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #0b132b; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .node { position: absolute; width: 80px; height: 80px; background: #3a86ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; border: 3px solid white; z-index: 10; font-size: 12px; }
        .del-btn { position: absolute; top: -5px; right: -5px; background: red; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body id="canvas">
    <div style="padding: 10px; pointer-events: none;">Doble toque para crear. Mantén presionado para mover.</div>
    <script>
        let lastTap = 0;
        document.getElementById('canvas').addEventListener('touchend', (e) => {
            let now = new Date().getTime();
            if(now - lastTap < 300 && e.target.id === 'canvas') {
                let n = document.createElement('div');
                n.className = 'node';
                n.innerText = 'Nodo';
                
                // Botón de eliminar individual
                let d = document.createElement('div');
                d.className = 'del-btn';
                d.innerText = 'x';
                d.ontouchstart = (ev) => { ev.stopPropagation(); n.remove(); };
                n.appendChild(d);

                n.style.left = (e.changedTouches[0].pageX - 40) + 'px';
                n.style.top = (e.changedTouches[0].pageY - 40) + 'px';
                
                let isDragging = false;
                n.ontouchstart = (ev) => { if(ev.target !== d) isDragging = true; };
                window.ontouchmove = (ev) => {
                    if(isDragging) {
                        n.style.left = (ev.touches[0].pageX - 40) + 'px';
                        n.style.top = (ev.touches[0].pageY - 40) + 'px';
                    }
                };
                window.ontouchend = () => isDragging = false;
                document.body.appendChild(n);
            }
            lastTap = now;
        });
    </script>
</body>
</html>
